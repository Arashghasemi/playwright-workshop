<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Demo Site</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-brand">
      <a href="/">DemoApp</a>
    </div>
    <button class="burger-menu" id="burger-menu" aria-label="Open menu" aria-expanded="false">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>
    <ul class="nav-links" id="nav-links" role="menubar">
      <li role="none"><a href="/" role="menuitem">Home</a></li>
      <li role="none"><a href="/fruits.html" role="menuitem">Fruits</a></li>
      <li role="none"><a href="/login.html" role="menuitem">Login</a></li>
    </ul>
  </nav>

  <main>
    <section class="form-container">
      <h1>Sign In</h1>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div id="error-message" class="error-message" role="alert" hidden></div>
        <button type="submit" id="login-btn">Sign in</button>
      </form>
    </section>
  </main>

  <script src="/js/nav.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
